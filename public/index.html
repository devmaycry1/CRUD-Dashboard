<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Funcionários</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>
    <main class="container">
        <div class="cadastro-cabecalho">
           <img src="./assets/Logo.png" class="logo" alt="">
            <h1 class="titulo">Funcionários</h1>
        </div>
        <section class="section">
            <h2 class="titulo-section">Cadastro</h2>
            <form class="formulario" id="formCadastro">
                <fieldset>
                    <legend class="formulario-legenda">
                        Informações
                    </legend>

                    <div class="input-container">
                        <input class="input" type="text" name="nome" id="nome" placeholder="Nome" data-tipo="nome"
                            required>
                        <label class="input-label" for="nome">Nome</label>
                        <span class="input-mensagem-erro">Este campo não está válido</span>
                    </div>

                    <div class="input-container">
                        <input class="input" type="email" name="email" id="email" placeholder="Email" data-tipo="email"
                            required>
                        <label class="input-label" for="email">Email</label>
                        <span class="input-mensagem-erro">Este campo não está válido</span>
                    </div>

                    <div class="input-container">
                        <input class="input" type="text" name="cargo" id="cargo" placeholder="Cargo" data-tipo="cargo"
                            required>
                        <label class="input-label" for="cargo">Cargo</label>
                        <span class="input-mensagem-erro">Este campo não está válido</span>
                    </div>

                    <div class="input-container">
                        <input class="input" type="text" name="departamento" id="departamento"
                            placeholder="Departamento" data-tipo="departamento" required>
                        <label class="input-label" for="departamento">Departamento</label>
                        <span class="input-mensagem-erro">Este campo não está válido</span>
                    </div>

                    <div class="input-container">
                        <input class="input" type="number" name="salario" id="salario" placeholder="Salário"
                            data-tipo="salario" min="0" step="0.01" required>
                        <label class="input-label" for="salario">Salário</label>
                        <span class="input-mensagem-erro">Este campo não está válido</span>
                    </div>

                    <div class="input-container">
                        <input class="input" type="date" name="data_admissao" id="data_admissao"
                            placeholder="Data de Admissão" data-tipo="data_admissao" required>
                        <label class="input-label" for="data_admissao">Data de Admissão</label>
                        <span class="input-mensagem-erro">Este campo não está válido</span>
                    </div>

                    <div class="input-container">
                        <select class="input" name="status" id="status">
                            <option value="Ativo">Ativo</option>
                            <option value="Inativo">Inativo</option>
                        </select>
                        <label class="input-label" for="status">Status</label>
                        <span class="input-mensagem-erro">Este campo não está válido</span>
                    </div>

                </fieldset>
                <div class="botao-container">
                    <button type="submit" id="botaoSalvar" class="botao">Cadastrar</button>
                    <button type="button" class="botao" id="botaoCancelar" style="display:none;">Cancelar</button>
                </div>
            </form>

            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Email</th>
                        <th>Cargo</th>
                        <th>Departamento</th>
                        <th>Salário</th>
                        <th>Admissão</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaFuncionarios"></tbody>
            </table>
            <div class="exportar-container">
                <button id="botaoExportar" class="botao-exportar">Exportar CSV</button>
            </div>
        </section>
    </main>



    <script type="module" src="script.js"></script>
</body>

</html>
